name: "proxy-mcp-exp"
tenant: "default"

routers:
  - server: "mock-user-sse"
    prefix: "/gateway/sse-proxy"
    cors:
      allowOrigins:
        - "*"
      allowMethods:
        - "GET"
        - "POST"
        - "OPTIONS"
      allowHeaders:
        - "Content-Type"
        - "Authorization"
        - "Mcp-Session-Id"
        - "mcp-protocol-version"
      exposeHeaders:
        - "Mcp-Session-Id"
        - "mcp-protocol-version"
      allowCredentials: true
  - server: "mock-user-mcp"
    prefix: "/gateway/streamable-http-proxy"
    cors:
      allowOrigins:
        - "*"
      allowMethods:
        - "GET"
        - "POST"
        - "OPTIONS"
      allowHeaders:
        - "Content-Type"
        - "Authorization"
        - "Mcp-Session-Id"
        - "mcp-protocol-version"
      exposeHeaders:
        - "Mcp-Session-Id"
        - "mcp-protocol-version"
      allowCredentials: true

mcpServers:
  - type: "sse"
    name: "mock-user-sse"
    url: "http://localhost:5237/sse"
    policy: "onDemand"

  - type: "streamable-http"
    name: "mock-user-mcp"
    url: "http://localhost:5237/mcp"
    policy: "onDemand"
